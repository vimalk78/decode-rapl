# DECODE-RAPL Configuration
# Delayed Embedding and Coherent Dynamics for Emulating RAPL

# Data paths
data:
  train_csv: "data/rapl_train.csv"
  output_dir: "results"
  plots_dir: "results/plots"
  checkpoint_dir: "checkpoints"

# Delay embedding parameters
embedding:
  tau: 1  # Time delay in milliseconds (1ms sampling rate)
  d: 25   # Number of delays (embedding dimension multiplier)
  # Total embedding dimension = d * num_features (e.g., 25 for single CPU usage)

# Preprocessing
preprocessing:
  window_size: 120  # Sequence length in timesteps (120ms windows for more context)
  stride: 1         # Stride for sliding windows
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  normalize_usage: true   # Normalize CPU usage to [0, 1]
  normalize_power: true   # Use MinMaxScaler on power

# Model architecture
model:
  latent_dim: 16       # Latent space dimension (increased capacity)
  encoder_layers:      # Encoder architecture (deeper and wider)
    - 512
    - 128
    - 64
  lstm_hidden_size: 128  # Increased LSTM capacity
  lstm_num_layers: 1
  dropout: 0.2
  adversarial_hidden: 32  # Hidden size for discriminator

# Training
training:
  batch_size: 32
  epochs: 100
  learning_rate: 0.002  # Increased for faster convergence
  weight_decay: 0.0001  # L2 regularization
  early_stopping_patience: 10

  # Loss weights (focus on power prediction)
  loss_weights:
    reconstruction: 0.05  # Reduced (less focus on autoencoder)
    adversarial: 0.0      # Disabled (was fighting power prediction)
    power_mse: 1.0        # Main objective

  # Device
  device: "cuda"  # "cuda" or "cpu" (auto-detect if cuda available)

# Inference
inference:
  buffer_size: 60      # Number of timesteps to buffer for real-time inference
  vm_mode: false       # Enable VM scaling mode
  vm_vcpus: 4          # VM vCPUs (if vm_mode=true)
  host_cores: 16       # Host physical cores (if vm_mode=true)
  sampling_rate_ms: 1  # Sampling rate for inference (1ms for bare-metal, 10-100ms for VM)

# Data collection (MSR parameters)
msr:
  # MSR addresses for Intel CPUs
  fixed_ctr1: "0x30A"  # IA32_FIXED_CTR1 (Unhalted core cycles)
  fixed_ctr2: "0x30B"  # IA32_FIXED_CTR2 (Reference cycles)
  pkg_energy: "0x611"  # MSR_PKG_ENERGY_STATUS (RAPL package energy)
  energy_unit: "0x606" # MSR_RAPL_POWER_UNIT (to decode energy units)

  # Sampling
  sampling_rate_ms: 1
  duration_hours: 10

  # Workload generation (stress-ng)
  workload:
    load_min: 5      # Minimum CPU load %
    load_max: 90     # Maximum CPU load %
    duration_min_sec: 1
    duration_max_sec: 10

# Logging
logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  log_file: "logs/decode_rapl.log"

# Random seed for reproducibility
seed: 42

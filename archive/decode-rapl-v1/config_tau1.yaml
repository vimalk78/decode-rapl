# DECODE-RAPL Configuration - τ=1 (Baseline, Dense Embedding)
# Delayed Embedding and Coherent Dynamics for Emulating RAPL
#
# This configuration uses τ=1 sample (16ms) for maximum temporal detail
# - Captures complete burst dynamics
# - Preserves ramp-up/ramp-down patterns
# - High redundancy but maximum information
# - Best for: Baseline comparison, when fine-grained dynamics matter

# Data paths
data:
  train_csv: "data/training_with_proc_monitoring_decode.csv"
  output_dir: "results/tau1_v2"
  plots_dir: "results/tau1_v2/plots"
  checkpoint_dir: "checkpoints/tau1_v2"

# Delay embedding parameters
embedding:
  tau: 1  # Time delay in SAMPLES (1 sample = 16ms at 16ms sampling rate)
  d: 25   # Number of delays (embedding dimension)
  # Total lookback: (d-1) * tau = 24 * 16ms = 384ms
  # With window_size=120: Total context = 120 * 16ms = 1920ms

# Preprocessing
preprocessing:
  window_size: 120  # Sequence length in timesteps (120 * 16ms = 1920ms context)
  stride: 1         # Stride for sliding windows
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  normalize_usage: true   # Normalize CPU usage to [0, 1]
  normalize_power: true   # Use MinMaxScaler on power
  sampling_rate_ms: 16    # FIXED: Match actual data (was 1ms)

# Model architecture
model:
  latent_dim: 16       # Latent space dimension
  encoder_layers:      # Encoder architecture
    - 512
    - 128
    - 64
  lstm_hidden_size: 128  # LSTM capacity
  lstm_num_layers: 1
  dropout: 0.2
  adversarial_hidden: 32  # Hidden size for discriminator

# Training
training:
  batch_size: 32
  epochs: 100
  learning_rate: 0.002
  weight_decay: 0.0001  # L2 regularization
  early_stopping_patience: 10

  # Loss weights
  loss_weights:
    reconstruction: 0.05
    adversarial: 0.0      # Disabled
    power_mse: 1.0        # Main objective

  # Device
  device: "cuda"  # "cuda" or "cpu"

# Inference
inference:
  buffer_size: 144     # window_size + (d-1)*tau = 120 + 24 = 144 samples
  vm_mode: false
  vm_vcpus: 4
  host_cores: 16
  sampling_rate_ms: 16  # Match training data

# Logging
logging:
  level: "INFO"
  log_file: "logs/decode_rapl_tau1_v2.log"

# Random seed for reproducibility
seed: 42
